<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – My Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 20%, rgba(255,140,66,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(255,68,0,0.08) 0%, transparent 50%),
                        #f7f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: #fff;
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 20px 20px 60px rgba(255,140,66,0.12),
                        -10px -10px 40px rgba(255,255,255,0.9),
                        0 0 0 1px rgba(255,140,66,0.08);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff8c42, #ff4400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        .auth-logo-sub {
            font-size: 0.82rem;
            color: #999;
            margin-top: 4px;
            letter-spacing: 0.03em;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .auth-desc {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e0d8;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #222;
            background: #fdf9f5;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus {
            border-color: #ff8c42;
            box-shadow: 0 0 0 3px rgba(255,140,66,0.12);
            background: #fff;
        }

        .error-box {
            background: rgba(255, 60, 60, 0.07);
            border: 1px solid rgba(255, 60, 60, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #cc2222;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ff8c42, #ff4400);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 16px rgba(255,100,0,0.3);
            margin-top: 6px;
        }
        .btn-primary:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(255,100,0,0.38);
        }
        .btn-primary:active { transform: translateY(0); }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #888;
        }
        .auth-footer a {
            color: #ff8c42;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover { text-decoration: underline; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: #ccc;
            font-size: 0.78rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ece4d8;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-title">✨ My Dashboard</div>
            <div class="auth-logo-sub">Your personal command center</div>
        </div>

        <h2>Welcome back</h2>
        <p class="auth-desc">Sign in to access your dashboard</p>

        {% if error %}
        <div class="error-box">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="identifier">Username or Email</label>
                <input type="text" id="identifier" name="identifier"
                       placeholder="Enter your username or email"
                       autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter your password"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary">Sign In →</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one free</a>
        </div>
    </div>
</body>
</html>
